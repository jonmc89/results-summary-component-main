<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Frontend Mentor | Results summary component</title>
  </head>
  <body>
    <main>
      <section class="results-section">
        <div class="results-content-wrapper">
          <h1>Your Result</h1>
          <div class="score-wrapper">
            <p class="number-score">76</p>
            <p class="out-of">of 100</p>
          </div>
          <p class="word-rating">Great</p>
          <p class="rating-text">
            You scored higher than 65% of the people who have taken these test.
          </p>
        </div>
      </section>
      <section class="summary-section">
        <div class="summary-content-wrapper">
          <h2>Summary</h2>
          <div class="summary-items-wrapper">
            <div class="summary-item">
              <div class="summary-catergory reaction-item">
                <img src="./assets/images/icon-reaction.svg" alt="" />
                <h3 class="reaction">Reaction</h3>
              </div>
              <div class="summary-score">
                <p class="summary-item-score">
                  80<span class="100"> / 100</span>
                </p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
